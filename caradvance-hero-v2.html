<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --font:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;
    --navy:#0B0B0D; --red:#E2001A; --red-dark:#B80015;
  }
  *{box-sizing:border-box} html,body{margin:0;padding:0}
  body{background:#F4F5F7}
  .hero{
    position:relative; font-family:var(--font); color:#fff;
    min-height:600px; display:flex; align-items:center; justify-content:center;
    text-align:center; padding:96px 24px; overflow:hidden;
    background:linear-gradient(180deg,#17181C 0%, var(--navy) 62%, #060607 100%);
    margin:16px; border-radius:32px;
  }
  @media(max-width:640px){ .hero{ margin:8px; border-radius:22px } }
  /* YouTube háttérvideó */
  .video-bg{position:absolute; inset:0; z-index:0; overflow:hidden; background:#0B0B0D}
  .video-bg iframe{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:100vw; height:56.25vw;            /* 16:9 a szélesség alapján */
    min-height:100%; min-width:177.78vh;     /* 16:9 a magasság alapján -> teljes lefedés */
    pointer-events:none; border:0;
  }
  /* Sötét fátyol a videó felett, hogy a szöveg olvasható legyen */
  .overlay{position:absolute; inset:0; z-index:1; background:
    radial-gradient(1100px 460px at 50% -10%, rgba(226,0,26,.18), transparent 60%),
    linear-gradient(180deg, rgba(8,8,10,.40) 0%, rgba(8,8,10,.46) 45%, rgba(8,8,10,.68) 100%);}
  .inner{position:relative; z-index:2; max-width:1120px; margin:0 auto}
  .brand-logo{height:60px; width:auto; display:block; margin:0 auto 26px; filter:drop-shadow(0 4px 18px rgba(0,0,0,.45))}
  @media(max-width:640px){.brand-logo{height:46px;margin-bottom:20px}}
  h1{
    font-size:clamp(34px,5vw,56px); line-height:1.08; font-weight:800;
    letter-spacing:-.025em; margin:0 0 16px; white-space:nowrap; text-shadow:0 2px 24px rgba(0,0,0,.35);
  }
  h1 .accent{color:var(--red); filter:brightness(1.35)}
  @media(max-width:880px){ h1{white-space:normal; font-size:clamp(30px,7vw,40px)} }
  .sub{
    font-size:clamp(16px,1.7vw,19px); line-height:1.5; color:#E7EAF0;
    max-width:560px; margin:0 auto 32px; text-shadow:0 1px 12px rgba(0,0,0,.4);
  }
  .cta-row{display:flex; gap:18px; justify-content:center; flex-wrap:wrap; align-items:center}
  .btn{
    display:inline-flex; align-items:center; gap:8px; font-family:inherit;
    font-weight:700; font-size:16px; padding:15px 32px; border-radius:999px;
    text-decoration:none; cursor:pointer; border:0; transition:background .15s;
  }
  .btn-primary{background:var(--red); color:#fff; box-shadow:0 10px 30px rgba(226,0,26,.4)}
  .btn-primary:hover{background:var(--red-dark)}
  .btn-white{background:#fff; color:var(--navy)}
  .btn-white:hover{background:#ECEEF2}
  .scrolldown{position:absolute; left:50%; bottom:24px; transform:translateX(-50%); z-index:3;
    display:flex; flex-direction:column; align-items:center; gap:4px; color:rgba(255,255,255,.8);
    background:none; border:0; cursor:pointer; font:inherit; letter-spacing:.04em; font-size:11px;
    text-transform:uppercase; animation:caScrollBob 1.9s ease-in-out infinite; transition:color .15s}
  .scrolldown:hover{color:#fff}
  .scrolldown svg{width:26px; height:26px}
  @keyframes caScrollBob{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,8px)}}
  @media(max-width:640px){ .scrolldown{bottom:14px; font-size:0} .scrolldown svg{width:24px;height:24px} }
</style>
