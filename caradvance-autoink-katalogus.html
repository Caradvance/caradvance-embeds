<style>
:root{--font:'Plus Jakarta Sans',system-ui,sans-serif;--navy:#0B0B0D;--red:#E2001A;--ink:#141519;--muted:#5A6B82;--line:#E6EAF1;--bg:#F4F7FB;--radius:16px}
*{box-sizing:border-box}html,body{margin:0;width:100vw;max-width:100vw;overflow-x:hidden}body{font-family:var(--font);background:var(--bg);color:var(--ink)}
.wrap{width:100%;max-width:min(1120px,100vw);min-width:0;margin:0 auto;padding:28px 12px}
@media(max-width:1024px){.wrap{padding-left:8px;padding-right:8px}}
.layout{display:grid;grid-template-columns:260px 1fr;gap:28px;align-items:start}
.filters{position:sticky;top:20px;background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:20px}
.filters h3{margin:0 0 16px;font-size:20px;font-weight:800}
.f-label{font-size:13px;font-weight:700;margin:16px 0 8px}
.search{width:100%;padding:11px 14px;border:1px solid var(--line);border-radius:10px;font-family:inherit;font-size:14px;background:var(--bg)}
.chips{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.chip{border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px 6px;font-size:12.5px;font-weight:600;cursor:pointer;text-align:center;font-family:inherit;color:var(--ink)}
.chip.active{background:var(--red);color:#fff;border-color:var(--red)}
select{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-family:inherit;font-size:14px;background:#fff;color:var(--ink)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:640px){.layout{grid-template-columns:1fr}.grid{grid-template-columns:1fr}.filters{position:static}.wrap{padding:20px 8px}}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;position:relative;cursor:pointer}
.card .btn::after{content:"";position:absolute;inset:0;z-index:1}
.card .feat{pointer-events:none}
.media{aspect-ratio:16/10;background:linear-gradient(135deg,#1A1B1F,#26272C);position:relative;overflow:hidden}
.media img{width:100%;height:100%;object-fit:cover;display:block}
.media .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#7a828f;font-size:12px;text-align:center;padding:0 12px}
.feat{position:absolute;top:12px;right:12px;background:var(--red);color:#fff;font-size:12px;font-weight:700;padding:5px 12px;border-radius:999px}
.own{position:absolute;top:12px;left:12px;background:#fff;border-radius:999px;padding:7px 12px;display:inline-flex;align-items:center;z-index:2;box-shadow:0 4px 12px rgba(8,8,10,.28)}

async function fetchRate(){
  const apis=[
    ['https://api.frankfurter.app/latest?from=EUR&to=HUF', d=>d&&d.rates&&d.rates.HUF],
    ['https://open.er-api.com/v6/latest/EUR', d=>d&&d.rates&&d.rates.HUF]
  ];
  for(const a of apis){try{const r=await fetch(a[0],{cache:'no-store'});if(!r.ok)continue;

  return false;
}

let LIST=FALLBACK;
const state={q:"",min:0,max:99999999,marka:"",karosszeria:"",valto:"",uzemanyag:""};
function opts(id,vals){const s=document.getElementById(id);const cur=s.value;s.innerHTML='<option value="">Összes</option>'+[...new Set(vals)].filter(Boolean).sort().map(v=>`<option>${v}</option>`).join('');s.value=cur;}
function nEur(v){return Number(String(v==null?'':v).replace(/[^\d.]/g,''))||0;}
/* Google Drive megosztási link -> megjeleníthető kép URL (bármely formátumot elfogad) */
function driveImg(u){u=String(u||'').trim();if(!u)return'';var m=u.match(/\/d\/([-\w]{20,})/)||u.match(/[?&]id=([-\w]{20,})/);if(m)return'https://lh3.googleusercontent.com/d/'+m[1]+'=w1600';if(/^[-\w]{25,}$/.test(u))return'https://lh3.googleusercontent.com/d/'+u+'=w1600';return u;}
function card(c){
  const img=c.kep_url?`<img src="${driveImg(c.kep_url)}" alt="${c.modell}" referrerpolicy="no-referrer" data-fb="${c.fallback||''}" onerror="if(this.dataset.fb){this.src=this.dataset.fb;this.dataset.fb='';}else{this.style.display='none';this.nextElementSibling.style.display='flex';}"><span class="ph" style="display:none">fotó hamarosan</span>`:`<span class="ph" style="display:flex">fotó hamarosan</span>`;
  const eur=nEur(c.vetel_eur);
  const main=hufUp(eur);
  const netto=nEur(c.vetel_eur_netto)||(eur/1.19);   // ha nincs nettó, a német 19%-ból
  const huGross=hufUp(netto*1.27);                    // magyar 27% áfás ár
  const save=huGross-main;
  const cross=save>0?`<span class="pcross">${fmtHUF(huGross)}</span>`:'';
  const savebadge=save>0?`<span class="psave">−${fmtHUF(save)}</span>`:'';
  return `<article class="card"><div class="media">${img}${(c.sajat||'').toString().toLowerCase()==='igen'?'<span class="own" title="CarAdvance saját autó"><i></i></span>':''}${(c.kiemelt||'').toString().toLowerCase()==='igen'?'<span class="feat">Kiemelt</span>':''}</div>

  <a class="btn" href="${DETAIL_URL}?auto=${slugify(c.modell)}" target="_top">Részletek</a></div></article>`;
}
function apply(){
  const f=LIST.filter(c=>{const p=Number(c.vetel_eur)||0;
    return ((c.aktiv||'igen').toLowerCase()!=='nem')&&(!state.q||(c.modell||'').toLowerCase().includes(state.q))&&p>=state.min&&p<=state.max

      &&(!state.valto||c.valto===state.valto)&&(!state.uzemanyag||c.uzemanyag===state.uzemanyag);});
  document.getElementById('grid').innerHTML=f.length?f.map(card).join(''):'<div class="empty">Nincs a szűrőnek megfelelő autó.</div>';
  document.getElementById('count').textContent=f.length+" autó";
}
function buildFilters(){opts('marka',LIST.map(c=>c.marka));opts('karosszeria',LIST.map(c=>c.karosszeria));opts('valto',LIST.map(c=>c.valto));opts('uzemanyag',LIST.map(c=>c.uzemanyag));}
// CSV parser (idézőjeles mezőkkel)
function parseCSV(t){const rows=[];let i=0,f='',row=[],q=false;while(i<t.length){const ch=t[i];
  if(q){if(ch=='"'){if(t[i+1]=='"'){f+='"';i++;}else q=false;}else f+=ch;}
  else{if(ch=='"')q=true;else if(ch==','){row.push(f);f='';}else if(ch=='\n'){row.push(f);rows.push(row);row=[];f='';}else if(ch=='\r'){}else f+=ch;}i++;}
  if(f.length||row.length){row.push(f);rows.push(row);}
  const head=rows.shift().map(h=>h.trim());return rows.filter(r=>r.some(x=>x&&x.trim())).map(r=>{const o={};head.forEach((h,i)=>o[h]=(r[i]||'').trim());return o;});}
['marka','karosszeria','valto','uzemanyag'].forEach(id=>document.getElementById(id).onchange=e=>{state[id]=e.target.value;apply();});
document.getElementById('q').oninput=e=>{state.q=e.target.value.toLowerCase();apply();};
document.querySelectorAll('#prices .chip').forEach(b=>b.onclick=()=>{document.querySelectorAll('#prices .chip').forEach(x=>x.classList.remove('active'));b.classList.add('active');state.min=+b.dataset.min;state.max=+b.dataset.max;apply();});
buildFilters();apply();
(async function(){
  try{const r=await fetch(SHEET_CSV_URL,{cache:'no-store'});if(r.ok){const rows=parseCSV(await r.text());if(rows.length){LIST=rows;buildFilters();apply();}}}catch(e){/* marad a fallback */}
  await fetchRate(); apply();                                   // élő árfolyam
  setInterval(async()=>{await fetchRate(); apply();}, 3600000); // óránként frissül
})();
