name: Build CarAdvance site

# Rebuilds the static site from the Google Sheet and publishes it.
# - Runs automatically every 2 hours (new cars / price edits go live within ~2h)
# - Runs on demand from the Actions tab ("Run workflow")
# - Runs when the generator itself changes
on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "generate.mjs"
      - ".github/workflows/build.yml"

permissions:
  contents: write

concurrency:
  group: build-site
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate site from Google Sheet
        run: node generate.mjs
        env:
          OUT: "."

      - name: Remove obsolete pages
        run: rm -f auto.html autoink.html

      - name: Commit & publish
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish."
          else
            git commit -m "Rebuild site from sheet [skip ci]"
            git push
          fi
