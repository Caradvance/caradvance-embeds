<meta charset="UTF-8">
<base target="_top"><meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--font:'Plus Jakarta Sans',system-ui,sans-serif;--navy:#0B0B0D;--navy-3:#26272C;--red:#E2001A;--ink:#141519;--muted:#5A6B82;--line:#E3E9F2;--bg:#F4F7FB;--radius:18px}
*{box-sizing:border-box}html,body{margin:0;width:100vw;max-width:100vw;overflow-x:hidden}body{font-family:var(--font);background:var(--bg);color:var(--ink)}
.block{padding:44px 0}.wrap{width:100%;max-width:min(1040px,100vw);min-width:0;margin:0 auto;padding:0 12px}
@media(max-width:1024px){.wrap{padding-left:8px;padding-right:8px}}
.head{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap;margin-bottom:26px}
.eyebrow{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--red)}
.eyebrow::before{content:"";width:26px;height:3px;background:var(--red);border-radius:2px}
h2{font-size:clamp(30px,4vw,44px);font-weight:800;letter-spacing:-.02em;margin:8px 0 0}
/* toggle */
.toggle{display:inline-flex;background:#fff;border:1px solid var(--line);border-radius:999px;padding:5px}
.toggle button{border:0;background:transparent;font-family:inherit;font-size:14.5px;font-weight:700;color:var(--ink);padding:11px 22px;border-radius:999px;cursor:pointer;transition:all .15s;white-space:nowrap}
.toggle button.active{background:var(--navy);color:#fff}
/* grid + cards */
.autok-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
/* Tablet + telefon: kártyák oldalra húzhatók (carousel) */
@media(max-width:900px){
  .block{overflow-x:hidden}
  .wrap{padding:0 8px}
  .head{flex-direction:column;align-items:flex-start;gap:14px}
  .toggle{align-self:flex-start}
  .autok-grid{display:flex;grid-template-columns:none;gap:14px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;padding-bottom:8px;scrollbar-width:none}
  .autok-grid::-webkit-scrollbar{display:none}
  .autok-grid>.card{flex:0 0 78%;scroll-snap-align:start}
}
@media(max-width:620px){.autok-grid>.card{flex:0 0 86%}}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;position:relative;cursor:pointer}
.card .btn::after{content:"";position:absolute;inset:0;z-index:1}
.card .tag{pointer-events:none}
.media{aspect-ratio:16/10;background:linear-gradient(135deg,var(--navy),var(--navy-3));position:relative;overflow:hidden}
.media img{width:100%;height:100%;object-fit:cover;display:block}
.media .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#7a828f;font-size:12px;text-align:center;padding:0 12px}
.tag{position:absolute;top:12px;right:12px;background:var(--red);color:#fff;font-size:12px;font-weight:700;padding:5px 12px;border-radius:999px;z-index:2}
.own{position:absolute;top:12px;left:12px;background:#fff;border-radius:999px;padding:7px 12px;display:inline-flex;align-items:center;z-index:2;box-shadow:0 4px 12px rgba(8,8,10,.28)}

.body{padding:16px 18px 18px;display:flex;flex-direction:column;flex:1}
.meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.cond{background:#EEF1F6;color:var(--muted);font-size:12px;font-weight:700;padding:4px 12px;border-radius:999px}
.year{color:var(--muted);font-size:13px;font-weight:700}
.title{font-size:17px;font-weight:800;letter-spacing:-.01em;margin:0 0 6px;line-height:1.2}
.specs{color:var(--muted);font-size:13px;font-weight:600;margin-bottom:14px}
.pricerow{display:flex;align-items:baseline;gap:9px;margin-top:auto;flex-wrap:wrap}
.pcross{width:100%;color:var(--muted);font-size:14px;font-weight:700;text-decoration:line-through}
.price{font-size:24px;font-weight:800;letter-spacing:-.01em}
.permo{color:var(--muted);font-size:13.5px;font-weight:700}
.psave{background:#E7F8EE;color:#1DA851;font-size:12px;font-weight:800;padding:4px 10px;border-radius:999px}
.taxnote{color:var(--muted);font-size:11.5px;font-weight:600;width:100%;margin-top:2px}
.btn{margin-top:14px;display:block;text-align:center;background:#EEF1F6;color:var(--ink);text-decoration:none;font-weight:700;padding:13px;border-radius:999px;transition:background .15s}
.btn:hover{background:var(--navy);color:#fff}
.ratenote{text-align:center;color:var(--muted);font-size:12.5px;font-weight:600;margin:18px 0 0}
.foot{text-align:center;margin-top:22px}
.allbtn{display:inline-block;background:var(--red);color:#fff;text-decoration:none;font-weight:700;font-size:15px;padding:14px 30px;border-radius:999px;transition:filter .15s}
.allbtn:hover{filter:brightness(.92)}

</div></section>
<script>
/* ADATFORRÁS: Google Sheet (gviz CSV). A KIEMELT (itt megjelenő 3) autó =
   a Sheet ELSŐ 3 sora az adott módban. Sorrend a Sheetben = megjelenési sorrend.
   Eladó mód: minden aktív sor. Bérelhető mód: aktív sorok, ahol van berlet_eur. */
const SHEET_CSV_URL="https://docs.google.com/spreadsheets/d/1rVdjNPmwPnqZ-whBBs0f_xnAnZRXP-ozeaNkQBvIO2Y/gviz/tq?tqx=out:csv";
/* === FRAMER OLDAL-ÚTVONALAK — állítsd be a saját oldalaid útvonalára === */
const SALE_DETAIL="auto.html";            // az az oldal, ahol a részletező embed van
const SALE_ALL="autoink.html";      // az az oldal, ahol a katalógus embed van
const RENT_DETAIL="auto.html";     // bérlet termékoldal (később)
const RENT_ALL="autoink.html";    // összes bérelhető (később)
let RATE_HUF=402; try{const _c=JSON.parse(localStorage.getItem('caRateHUF')||'null');if(_c&&_c.v>0)RATE_HUF=_c.v;}catch(e){}  // EUR->HUF (megosztott cache), óránként frissül
async function fetchRate(){
  const apis=[
    ['https://api.frankfurter.app/latest?from=EUR&to=HUF', d=>d&&d.rates&&d.rates.HUF],
    ['https://open.er-api.com/v6/latest/EUR', d=>d&&d.rates&&d.rates.HUF]
  ];
  for(const a of apis){try{const r=await fetch(a[0],{cache:'no-store'});if(!r.ok)continue;
    const v=a[1](await r.json());if(v&&v>0){RATE_HUF=v;try{localStorage.setItem('caRateHUF',JSON.stringify({v:v,t:Date.now()}));}catch(e){}return true;}}catch(e){}}
  return false;
}
function hufUp(eur){return Math.ceil((Number(eur)||0)*RATE_HUF/10000)*10000;}
function fmtHUF(v){return v.toLocaleString('hu-HU')+' Ft';}
function slugify(m){return String(m).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');}
function nEur(v){return Number(String(v==null?'':v).replace(/[^\d.]/g,''))||0;}
/* Google Drive megosztási link -> megjeleníthető kép URL (bármely formátumot elfogad) */
function driveImg(u){u=String(u||'').trim();if(!u)return'';var m=u.match(/\/d\/([-\w]{20,})/)||u.match(/[?&]id=([-\w]{20,})/);if(m)return'https://lh3.googleusercontent.com/d/'+m[1]+'=w1600';if(/^[-\w]{25,}$/.test(u))return'https://lh3.googleusercontent.com/d/'+u+'=w1600';return u;}
const FALLBACK=[
 {"modell":"BMW X6 xDrive30d M Sport Pro INDIVIDUAL \"22\"","km":"19.000 km","teljesitmeny":"298 LE","valto":"Automata","uzemanyag":"Dízel","evjarat":"10/2025","berlet_eur":1624,"vetel_eur":83900,"vetel_eur_netto":70504,"kep_url":"https://lh3.googleusercontent.com/d/15qeS-QifNeKy4IVHatRx8MfLcI5JigK0=w1200","kiemelt":"igen","aktiv":"igen"},
 {"modell":"BMW X7 xDrive40d M Sport Pro \"23\" LUFT H&K","km":"24.915 km","teljesitmeny":"352 LE","valto":"Automata","uzemanyag":"Dízel","evjarat":"12/2025","berlet_eur":1562,"vetel_eur":91819,"vetel_eur_netto":77158,"kep_url":"","kiemelt":"","aktiv":"igen"},
 {"modell":"BMW X2 xDrive20d M Sport Pro","km":"11.500 km","teljesitmeny":"163 LE","valto":"Automata","uzemanyag":"Dízel","evjarat":"11/2025","berlet_eur":1087,"vetel_eur":53900,"vetel_eur_netto":45294,"kep_url":"","kiemelt":"","aktiv":"igen"}
];
let LIST=FALLBACK, MODE="elado";
function saleCard(c){
  const img=c.kep_url?`<img src="${driveImg(c.kep_url)}" alt="${c.modell}" referrerpolicy="no-referrer" data-fb="${c.fallback||''}" onerror="if(this.dataset.fb){this.src=this.dataset.fb;this.dataset.fb='';}else{this.style.display='none';this.nextElementSibling.style.display='flex';}"><span class="ph" style="display:none">fotó hamarosan</span>`:`<span class="ph" style="display:flex">fotó hamarosan</span>`;
  const eur=nEur(c.vetel_eur), main=hufUp(eur);
  const netto=nEur(c.vetel_eur_netto)||(eur/1.19), huGross=hufUp(netto*1.27), save=huGross-main;
  const cross=save>0?`<span class="pcross">${fmtHUF(huGross)}</span>`:'';
  const savebadge=save>0?`<span class="psave">−${fmtHUF(save)}</span>`:'';
  return `<article class="card"><div class="media">${img}${(c.sajat||'').toString().toLowerCase()==='igen'?'<span class="own" title="CarAdvance saját autó"><i></i></span>':''}<span class="tag">Kiemelt</span></div>
  <div class="body"><div class="meta"><span class="cond">Használt</span><span class="year">${c.evjarat||''}</span></div>
  <div class="title">${(c.modell||'').trim()}</div>
  <div class="specs">${[c.km,c.teljesitmeny,c.valto,c.uzemanyag].filter(Boolean).join(' · ')}</div>
  <div class="pricerow">${cross}<span class="price">${fmtHUF(main)}</span><span class="permo">${eur.toLocaleString('hu-HU')} €</span>${savebadge}</div>
  <a class="btn" href="${SALE_DETAIL}?auto=${slugify(c.modell)}" target="_top">Részletek</a></div></article>`;
}
function rentCard(c){
  const img=c.kep_url?`<img src="${driveImg(c.kep_url)}" alt="${c.modell}" referrerpolicy="no-referrer" data-fb="${c.fallback||''}" onerror="if(this.dataset.fb){this.src=this.dataset.fb;this.dataset.fb='';}else{this.style.display='none';this.nextElementSibling.style.display='flex';}"><span class="ph" style="display:none">fotó hamarosan</span>`:`<span class="ph" style="display:flex">fotó hamarosan</span>`;
  const eur=nEur(c.berlet_eur), main=hufUp(eur);
  return `<article class="card"><div class="media">${img}<span class="tag">Kiemelt</span></div>
  <div class="body"><div class="meta"><span class="cond">Bérelhető</span><span class="year">${c.evjarat||''}</span></div>
  <div class="title">${(c.modell||'').trim()}</div>
  <div class="specs">${[c.km,c.teljesitmeny,c.valto,c.uzemanyag].filter(Boolean).join(' · ')}</div>
  <div class="pricerow"><span class="price">${fmtHUF(main)}</span><span class="permo">/ hó · ${eur.toLocaleString('hu-HU')} €</span></div>
  <a class="btn" href="${RENT_DETAIL}?auto=${slugify(c.modell)}" target="_top">Részletek</a></div></article>`;
}
function featured(){
  const active=LIST.filter(c=>(c.aktiv||'igen').toString().toLowerCase()!=='nem');
  if(MODE==='elado') return active.filter(c=>nEur(c.vetel_eur)>0).slice(0,3);
  return active.filter(c=>nEur(c.berlet_eur)>0).slice(0,3);
}
function render(){
  const cars=featured();
  const fn=MODE==='elado'?saleCard:rentCard;
  document.getElementById('grid').innerHTML=cars.length?cars.map(fn).join(''):'<div style="grid-column:1/-1;color:var(--muted);padding:30px;text-align:center">Nincs megjeleníthető autó.</div>';
  const a=document.getElementById('allbtn');
  if(MODE==='elado'){a.textContent='Összes eladó autónk →';a.href=SALE_ALL;}
  else{a.textContent='Összes bérelhető autónk →';a.href=RENT_ALL;}
  document.querySelectorAll('#toggle button').forEach(b=>b.classList.toggle('active',b.dataset.mode===MODE));
  document.getElementById('ratenote').textContent='A forint árak élő árfolyammal számolódnak, óránként frissülnek (1 € = '+Math.round(RATE_HUF).toLocaleString('hu-HU')+' Ft).';
}
document.querySelectorAll('#toggle button').forEach(b=>b.onclick=()=>{MODE=b.dataset.mode;render();});
function parseCSV(t){const rows=[];let i=0,f='',row=[],q=false;while(i<t.length){const ch=t[i];
  if(q){if(ch=='"'){if(t[i+1]=='"'){f+='"';i++;}else q=false;}else f+=ch;}
  else{if(ch=='"')q=true;else if(ch==','){row.push(f);f='';}else if(ch=='\n'){row.push(f);rows.push(row);row=[];f='';}else if(ch=='\r'){}else f+=ch;}i++;}
  if(f.length||row.length){row.push(f);rows.push(row);}
  const head=rows.shift().map(h=>h.trim());return rows.filter(r=>r.some(x=>x&&x.trim())).map(r=>{const o={};head.forEach((h,i)=>o[h]=(r[i]||'').trim());return o;});}
